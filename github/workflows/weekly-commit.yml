# .github/workflows/weekly-commit.yml
# Repo: Customer-support-agent-using-openai-and-azure
# Commits analysis.ipynb, __init__.py, demo.py, helper.py every Monday.

name: Weekly Commit (Customer Support)

on:
  schedule:
    # cron is UTC. Day-of-week 1 = Monday. This is Monday 09:00 UTC.
    - cron: "0 9 * * 1"
  workflow_dispatch: {}   # manual trigger from the Actions tab, for testing

permissions:
  contents: write

jobs:
  weekly-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Touch tracked files
        run: |
          DATE=$(date -u '+%Y-%m-%d')

          # Python files: maintain a single trailing keep-alive comment.
          for f in __init__.py demo.py helper.py; do
            grep -v '^# keep-alive:' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
            echo "# keep-alive: $DATE" >> "$f"
          done

          # Notebooks: update a metadata field so JSON stays valid.
          for f in analysis.ipynb; do
            python3 - "$f" "$DATE" << 'PY'
import json, sys
path, date = sys.argv[1], sys.argv[2]
with open(path) as fh:
    nb = json.load(fh)
nb.setdefault('metadata', {})['keep_alive'] = date
with open(path, 'w') as fh:
    json.dump(nb, fh, indent=1)
    fh.write('\n')
PY
          done

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add analysis.ipynb __init__.py demo.py helper.py
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: weekly update ($(date -u '+%Y-%m-%d'))"
            git push
          fi
